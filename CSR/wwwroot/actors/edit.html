<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Edit Actor • Simple Movie Database</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/styles/main.css" />
  <script type="module" src="/scripts/actors/edit.js" defer></script>
</head>
<body>
  <header>
    <h1>Edit Actor</h1>
    <nav>
      <ul>
        <li><a href="/" class="btn">Home</a></li>
        <li><a href="/actors/index.html" class="btn">All Actors</a></li>
      </ul>
    </nav>
  </header>
  <main class="container">
    <div id="status" class="status">Loading...</div>
    <form id="actor-form" class="grid">
      <div class="field">
        <label for="firstName">First Name</label>
        <input id="firstName" name="firstName" type="text" required />
      </div>
      <div class="field">
        <label for="lastName">Last Name</label>
        <input id="lastName" name="lastName" type="text" required />
      </div>
      <div class="field">
        <label for="rating">Rating (0–5)</label>
        <input id="rating" name="rating" type="number" min="0" max="5" step="0.1" required />
      </div>
      <div class="form-actions">
        <button class="btn primary" type="submit">Save Changes</button>
        <a class="btn" href="/actors/index.html">Cancel</a>
      </div>
    </form>
  </main>
</body>
</html>
