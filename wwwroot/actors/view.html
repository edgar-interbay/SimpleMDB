<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>View Actor • Simple Movie Database</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/styles/main.css" />
  <script type="module" src="/scripts/actors/view.js" defer></script>
</head>
<body>
  <header>
    <h1>View Actor</h1>
    <nav>
      <ul>
        <li><a href="/index.html" class="btn">Home</a></li>
        <li><a href="/actors/index.html" class="btn">All Actors</a></li>
        <li><a id="edit-link" class="btn">Edit</a></li>
      </ul>
    </nav>
  </header>
  <main class="container">
    <div id="status" class="status">Loading...</div>
    <table class="table">
      <tbody>
        <tr><th>ID</th>         <td id="actor-id">—</td></tr>
        <tr><th>First Name</th> <td id="actor-firstname">—</td></tr>
        <tr><th>Last Name</th>  <td id="actor-lastname">—</td></tr>
        <tr><th>Rating</th>     <td id="actor-rating">—</td></tr>
      </tbody>
    </table>
    <h2 style="margin-top:1.5rem;">Movies</h2>
    <div id="actor-movies" class="grid cards" style="margin-top:.5rem;"></div>
  </main>
</body>
</html>
